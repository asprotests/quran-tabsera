<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quran Tabsera: Request Data Deletion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #eef1f5;
      --card-bg-color: #ffffff;
      --primary-color: #dc2626;
      --primary-hover: #b91c1c;
      --text-color: #4b5563;
      --heading-color: #1f2937;
      --border-color: #d1d5db;
      --shadow-color: rgba(0, 0, 0, 0.08);
      --border-radius: 16px;
      --font-family: 'Poppins', sans-serif;
      --success-color: #16a34a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-family);
      margin: 0;
      padding: 1.5rem;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 500px;
      padding: 2.5rem 2rem;
      background: var(--card-bg-color);
      border-radius: var(--border-radius);
      box-shadow: 0 10px 25px var(--shadow-color);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--heading-color);
      text-align: center;
      margin-top: 0;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      text-align: center;
      color: var(--text-color);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--heading-color);
      margin-bottom: 0.5rem;
    }

    label .optional {
      font-weight: 400;
      color: var(--text-color);
      font-size: 0.8rem;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"] {
      width: 100%;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      font-family: var(--font-family);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="tel"]:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1);
    }

    .checkbox-group {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 1rem;
      background-color: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      margin-bottom: 1.5rem;
    }

    .checkbox-group input[type="checkbox"] {
      width: 20px;
      height: 20px;
      margin-top: 2px;
      accent-color: var(--primary-color);
      cursor: pointer;
      flex-shrink: 0;
    }

    .checkbox-group label {
      margin-bottom: 0;
      font-size: 0.9rem;
      font-weight: 400;
      color: var(--heading-color);
      cursor: pointer;
      line-height: 1.5;
    }

    .submit-btn {
      width: 100%;
      padding: 0.875rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      font-family: var(--font-family);
      color: white;
      background-color: var(--primary-color);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
    }

    .submit-btn:hover:not(:disabled) {
      background-color: var(--primary-hover);
    }

    .submit-btn:active:not(:disabled) {
      transform: scale(0.98);
    }

    .submit-btn:disabled {
      background-color: #9ca3af;
      cursor: not-allowed;
    }

    .success-message {
      display: none;
      text-align: center;
      padding: 2rem;
    }

    .success-message.show {
      display: block;
    }

    .success-icon {
      width: 64px;
      height: 64px;
      background-color: #dcfce7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
    }

    .success-icon svg {
      color: var(--success-color);
    }

    .success-message h2 {
      color: var(--heading-color);
      font-size: 1.25rem;
      margin: 0 0 0.5rem;
    }

    .success-message p {
      color: var(--text-color);
      margin: 0;
      font-size: 0.95rem;
    }

    .form-content.hidden {
      display: none;
    }

    .error-message {
      color: var(--primary-color);
      font-size: 0.85rem;
      margin-top: 0.25rem;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    @media (max-width: 768px) {
      .container {
        padding: 2rem 1.5rem;
      }
      h1 {
        font-size: 1.25rem;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="form-content" id="formContent">
      <h1>Request Data Deletion</h1>
      <p class="subtitle">Quran Tabsera Account & Data Removal</p>

      <form id="deletionForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required placeholder="Enter your username">
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required placeholder="Enter your email">
        </div>

        <div class="form-group">
          <label for="phone">Phone Number <span class="optional">(Optional)</span></label>
          <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="confirmDeletion" name="confirmDeletion" required>
          <label for="confirmDeletion">
            I confirm that I want to permanently delete my account and all associated data. I understand this action cannot be undone.
          </label>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">Submit Request for Data Deletion</button>
      </form>
    </div>

    <div class="success-message" id="successMessage">
      <div class="success-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
      <h2>Request Submitted</h2>
      <p>Your data deletion request has been received. We will process your request and send a confirmation to your email within 48 hours.</p>
    </div>
  </main>

  <script>
    const form = document.getElementById('deletionForm');
    const formContent = document.getElementById('formContent');
    const successMessage = document.getElementById('successMessage');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const confirmed = document.getElementById('confirmDeletion').checked;

      if (!username || !email || !confirmed) {
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting...';

      try {
        const response = await fetch('/api/proxy?type=deletion-request', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ username, email, phone }),
        });

        // Show success regardless (for now)
        formContent.classList.add('hidden');
        successMessage.classList.add('show');
      } catch (error) {
        // Still show success for user experience
        formContent.classList.add('hidden');
        successMessage.classList.add('show');
      }
    });
  </script>
</body>
</html>
